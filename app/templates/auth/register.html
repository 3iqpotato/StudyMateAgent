<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — AI Test Helper</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="card">
    <h1>Създай акаунт</h1>
    <p class="subtitle">Безплатно и без усилие</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/auth/register">
        <div class="form-group">
            <label>Име</label>
            <input type="text" name="name" placeholder="Иван Иванов" required>
        </div>
        <div class="form-group">
            <label>Имейл</label>
            <input type="email" name="email" placeholder="тебе@example.com" required>
        </div>
        <div class="form-group">
            <label>Парола</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Регистрирай се</button>
    </form>

    <div class="link-row">
        Вече имаш акаунт? <a href="/auth/login">Влез</a>
    </div>
</div>
</body>
</html>
